body:
  text: 總論二十四舉一舉曰風論云癘者因榮衛熱胕吳云胕腐同其氣不清故使鼻柱壞而色敗皮膚瘍壞脈要精微論云脈風成為癘以是觀之則斯病之生也多從風起風氣搏肌肉與熱氣並則榮衛壅塞難通血氣精髓乖離遂令人身體遍癢手足頑痹身面腫痛眉睫墮落眼光閃閃久而不治則至於鼻柱崩倒蝕指穿骨終不可復也蓋此病多因風土所生中國少有此證惟煙瘴地面多有之或觸糞坑穢氣或露臥當風或睡眠濕地毒風襲血脈遂釀作此病也又有過食膏粱油膩或房勞穢汙以致火動血熱或產後瘀血不盡者俱加風寒冷濕胃氣混濁以生蛔蠍積年之後終發此證者矣又有幼年姿豐美麗肌膚潔白恰如冰雪者動輒發此證者矣此所謂宿業緣會之所為也歟將自高曾祖血氣相傳者歟抑負功德祟歟未可知也然至治法之手段俱一也又有黴瘡似癘者有酒毒似癘者宜詳而治之二舉曰癘風之病古人立名論證尤多今唯舉其目曰大風曰大麻風曰大風瘡曰害大風曰大皮風曰順風曰逆風曰刺風曰泄風曰瞤風曰頑風曰癗風曰木癘曰火癘曰金癘曰土癘曰水癘曰面癘曰蟋蟀癘曰雨癘曰麻癘曰䖲癘曰酒癘曰烏癘曰白癘曰白牛疾曰癩瘡曰癩病曰蟲癩曰㽿癩曰黑癩近世俗多單用瘋字惟是從風從疒耳命名多端如此論證各異或分上下以施治或以蟲蝕五藏立方豈愈繁愈失者非邪此書之論治法方不出辨輕重二證之外耳三舉曰治病分寒熱辨虛實萬世不易之程法豈可忽諸癩風之於病亦不復無虛實寒熱之分也若得此病而屬虛寒者斷為難治也強欲治之者譬諸割瘤非徒勞而無益反損其天年故此書治法悉為壯實者設耳四舉曰凡眼中黃色者合谷及魚腹肉脫者或爪根無白暈者或持物不知自墮者或手足心破裂血出者或眼目既蝕或玉莖腐爛或四肢攣拳或身體黑斑者或十指如雞距子者或周身毫毛脫落者或鼻柱崩塌者或蝕指穿骨者或常飲食色欲過多者或屢浴溫泉者或齡過四十者或身體瘦瘠者俱為難治也五舉曰若多淫多食者與身體黑斑者雖固屬不治證候亦有輕證兼見之者以其為難治候概不可遐棄焉其救療之法宜灸脊骨第十一椎節下日三壯服藥中必不可少也六舉曰凡不拘輕證重證有見證脈候頗似可理而不可療者所謂驕恣不論於理輕身重財自知惡疾而不欲服藥餌恣口味而不為遵師教其若此者雖和緩復出不可奈之何也不啻是諸疾皆然故扁鵲論六不治郭玉說四難七舉曰輕證者宜用三稜針以取死血刺之之法當於死肉與平肉之際下針不然則瘀血出少矣又至其尤輕證者取曲池與委中宜間二三日若四五日刺之不可日刺之也如其重證者非燒針則難收功矣夫燒針之名肇出於張仲景傷寒論即內經所謂燔針粹針之類而主治風寒筋爭攣引痹痛或症塊結積癰疽發背癱瘓不仁等證然後世此法不傳焉惜哉今余之所用者頗與之異其數十有三而鋒長七寸五分即用今之曲尺尖如挺其鋒員且銳柄形六稜長三寸內一柄乃為平頭針圓見後凡制針宜以柔鐵必不可用鋼鐵其害不淺也八舉曰欲用燒針則須先視毒淺深多少而後施之看之之法將患者房內解帶令坐窗戶盡閉令暗黑點火於樟腦可以視其周身凡其毒隱皮膚中不見者燎燎乎猶觀火也其色如水葒色者其毒必淺若其色紫黯者其毒必深矣且瘀血形狀不一有方者有圓者有長者有短者有楕者有如鱗甲者有如胡蘆者皆沿其死血所在處之大小形狀之變態取筆以盡記其匡郭訖披窗戶而施燒針其毒多在面部手足項背而腹部有之者甚少九舉曰凡刺燒針先以五斤炭火按排大火盆中除平頭針之外十二針盡列於火上緊火燒令通赤然後周身墨圍中不留一處盡刺之刺之之法取一針刺一處刺卒直反諸火上又取次針刺之如前法十二針刺卒則再取反火上之針更刺之不拘肉厚薄堅脆經脈血氣多少及禁針禁灸等輸穴隨瘀血所在處而盡刺之針痏其間各相去如蔥莖凡所刺針孔曾無有血流出者又無有覺疼痛者也燒針之法須令一人向火扇之手不可暫止若炭火欲盡則再加炭以扇之針若不通赤或遲寬而冷則反損人且不能去病也謹之謹之十舉曰欲刺燒針則須令患者側臥先於手足中毒之最深處試刺五六痏必不可令患者見焉何則苦見炭火焰焰燒針通赤加火則患者不免驚懼體戰齒鬥猶犯法人褫衣受刃矣故目下刺之則針未至皮膚顰眉蹙額聳身不能刺也不令其見之則針入一寸有奇猶且不覺痛癢於是患者異之自以為非此法必不治遂至自請多其針凡刺燒針畢則必身體發熱面色正赤口舌乾燥或頭痛或渴當此之時宜與溫湯一二口更燒平頭針通赤以其頭印百會穴如此則患者抑鬱之氣豁然散發矣凡用平頭針手法手須輕捷稍遲則不任痛楚反害焉十一舉曰刺燒針總三日第二日於初一日所刺針痏間盡刺之第三日亦放之始下針其毒最深處針入一二寸而患者曾無覺痛癢至第二日則針入七八分稍稍覺痛至第三日則針入僅五六分亦不任痛苦蓋死血去而新血漸生也將施燒針前當拔患人頭髮試之拔之則隨手而離肉正如拔無根草必不知痛癢也其刺燒針畢後則欲拔之髮根緊堅而如尋常人是瘀濁去而營血充也十二舉曰輕證者初起皮膚不仁或淫淫癢如蟲行或十指頭常冷或乍寒乍熱或手足痠痛或股脛時如被針錐刺或身體遍癢搔之生瘡或手足一片常冰冷或𤸷如錢大或痛無常處流移非一或身起白屑或手足小指頑痹或身體手足發腫或如按豆或如酸棗或出或沒當此時當以樟腦一塊如雞卵大點火照看周身以認其毒多少仍以三稜針去瘀血然後更服當歸湯二十日繼吞竹精丸四五十日莫有不瘥者焉十三舉曰重證者身體磊塊其色紫赤如彈丸大或如雞子大若近火則為水泡過二三日若四五日則頂陷而黃水流出或如蕩湯火傷之瘡或眉睫墮落眼光如電或皮膚皴散如樹皮手指欲拳或面目無潤其色灰白或身面腫痛徹骨髓或語聲嘶散或耳鳴啾啾或身體頑痹不知痛癢針灸不覺痛楚或身中發瘡一二一處瘥則又發他處展轉不已或毛髮拔之不痛於此時急用當歸湯七八日後更刺繞針三日每夜臨臥向一更來宜以白湯服第一神效散至第四日服第二神效散五日至七日服第三神效散服法俱仿第一神效散十四舉曰凡刺燒針服三種神效散之間切不可食鮮鮭諸肉生蔬酒醋鹽滷豆油等物也惟於朝饔時淡味醬汁煮瓢畜可輔食味矣午飯夕飡斷不可食鹹味宜以淡漿粥將養之十五舉曰凡服第一神效散則其夜必腹中雷鳴疼痛或嘔吐穢物或大便下穢水瘀物或如稠痰之狀或小便如丹粉和膠脂達旦而止服第二神效散則下諸蟲或衃血血瓣紫黑褐色等物至第三方則下物亦不多其色如雞蛋黃之狀或軟或硬亦徹旦止矣自服神效散之二三日針疻水出不止必不可用敷貼藥漸漸結靨而自剝落若遷延數日不止者當以蕎麥粉摻之十六舉曰凡七日內服三種神效散已後又以虎勢丸一劑分為十五日以一貼白湯吞下日三夜二而過八九日若十餘日則針瘡自結痂赤斑亦尋滅手指將拳者漸伸飲食日進形體亦當壯健然後繼以龍石湯十七舉曰凡治此證須令患者清淡口味斷絕色欲此乃一大緊要事也若犯此戒則不免再發也假令其病瘥對酬如常可禁忌者尤多宜食者僅僅乎無幾也今舉其可啖者若干以列於下凡如粳米大麥小麥黑白大豆赤豆綠豆胡麻乾菜薯蕷砂糖萊蔔冬瓜萵苣牛蒡根蕪菁干芋梗五加葉枸杞葉雞腸菜蒲公英獨活三葉龩葛粉瓢畜等及海參鰺魚串鰒石首魚梭魚棘鬣魚𬵵魚鰈魚火點鱵魚蜆肉乾鰹之類熟烹而常啖可矣然如魚肉必不可日吃之其他一切物斷然不可食也如禽獸諸肉觸口亦為大患戒之戒之十八舉曰患此證者必不可浴溫泉蓋溫泉之為性金鐵硫黃硃砂海鹽礜石礬石砒石雄黃等氣蒸為暖流耳如利關節通壅滯撲損閃肭疥癬等病在表而不關裡者固所宜也若梅瘡結毒痼疾沉疴假令浴之發出濕毒豈足除其根本哉況如癩風其毒深痼病之至惡無出於此矣若一浴之者其毒蔓延終作不治證也若其幸不浴者其毒僅結二三四五處燒針易施治效易收也故此證之於溫泉殊在大禁所可深畏也十九舉曰有酒客患若癩證者亦不可不察焉夫酒之為性其氣剽悍滑利暴氣動血其極竟釀成瘀血或作面上赤斑紫暈或生赤禿齇鼻酒刺或周身發㾦癗或成癬或起皰動輒延綿不瘥遂至眉發脫落庸工不察認為癩風以治之致不起者往往乎有焉當照前所述諸證及看法以詳察之治之之法宜發散解肌清熱也又有黴瘡壞證殆似癩者見證不甚異矣治法宜專主化毒也又有癩風其毒之輕似黴瘡壞證者亦宜詳審焉如此證切不可用稜針三稜針等也惟宜與苦參丸久服緩治以收效二十舉曰凡此證施治術自立夏後至白露前為限矣何則天地氣候陽盛而人氣亦在表故其毒殊易祛不易得風寒也若秋冬春初風氣凜冽陰冷盛而人氣在裡當此時施燒針則針處被寒動輒有生變證者故殊禁之若不得止而欲施針則宜置患者於燠室中密塞風隙常用火一盆然竟不若時候溫暖之穩協也二十一舉曰夫疾疢之於人身何限焉巢氏病源敘一千七百二十七候猶且不能盡其名數雖則不能盡其名數未有若癩風最至惡者也是故一罹此病則夫人避忌之視以穢惡之猶屠人乞者非但避忌其人睹其兄弟姊妹親屬亦復然矣故婚姻嫁娶將立契約則詰問之殊為嚴緊假令即今無一人之患之者若其祖先嘗有患之者則雖有宮室帷帳之麗佳冶窈窕之美不得納幣於蓬戶桑樞之庳椎髻荊釵之魗蓋諱其血脈傳染不敢受之也故好人擇好家癘儔遴癘屬本邦田野人民正其瓜葛者自古為然矣然而如都下人士工商卻不拘之其志皆在慕聘財之多少與其家之富貴噫如何哉是雖非醫家所關姑記為世之鑑戒二十二舉曰本邦南都有癘村其家數百戶癘兒皆居之云頃閱中華書籍所載有幾與之同者祝允明猥談云南方過癩小說多載之近聞其症乃有癩蟲自男女精液中過去故此脫而彼染如男入女固易若女染男者亦自女精中出隨入男莖中也周按此說難信據若男欲除蟲者以荷葉卷置女陰中既輸泄即抽出葉精與蟲悉在其中即棄之精既不入女陰宮女亦無害也此治療妙術故不厭猥褻詳述之今南中有癩人處官置癩坊居之不以貴賤知體蘊癩者家便聞官隱者有罰焉此說原見陸游老學庵筆記又吳震芳嶺南雜記及石天基食愈方載大痲瘋嶺南頗多因設痲瘋院以別居之他如卑濕之處淫熱之人亦間有之又屈大均廣東新語有瘋人園之名今按華人所錄俱言嶺南煙瘴卑濕之地尤多焉如本邦非但南方有之四方州郡頗多矣然而如西京東都繁華地患之者甚少惟罹黴瘡病者自中古逮今特為多如山野人民罕能患焉近世黴瘡蔓延通國而山野人患癘疾者稍鮮云是時運之使然歟未可知也余友吉資坦田公幹亦云四十年來黴瘡殊多而癘疾漸罕蓋聞之古老之話二十三舉曰余嘗瀏覽諸書載服松脂松木以治癩疾之事以意度之病者銕心能斷禽獸魚鱉省米穀糖面屏絕嗜欲之情割捨愛好之意以如法服之有所謂非止瘥病乃因禍而取福也此余雖未試其藥太易得所厭者僅煉製之勞耳寒鄉山野乏醫藥處者多修合以施於人功德最大故一二攟摭以舉於茲葛洪抱朴子云上黨趙瞿病癩歷年垂死其家棄之送置山穴中瞿怨泣經月有仙人見而哀之以一囊藥與之瞿服百餘日其瘡都愈顏色豐悅肌膚玉澤仙人再過之瞿謝活命之恩乞求其方仙人曰此是松脂止中便多此物汝煉服之可以長生不死瞿乃歸家長服身體轉輕氣力百倍登危涉險終日不困年百餘歲齒不墜發不白夜臥忽見屋間有光大如鏡久而一室盡明如晝又見面上有采女一人戲於口鼻之間後入抱犢山成地仙於是人聞瞿服此脂皆競服之車運驢負積之盈室不過一月未覺大益皆輒止焉志之不堅如此又巢元方病源論云始起便急始之斷米穀餚鮭專食胡麻松木輩最善也又孫真人千金方云余以貞觀中將一病士入山教服松脂欲至百日鬚眉皆生由此觀之惟須求之於己不可一仰醫藥者也云云又石天基食愈方載治癘風一方云用明淨松香不拘多少去渣滓取溪河淡水或雨水用淨鍋將松香煮化不住手攪視水色如米泔嘗味極苦即傾冷水內將松香乘熱扯拔冷定堅硬別換清水再煮再拔如前製法不論幾十次只以松香體質鬆脆潔白所煮之水澄清不苦為度陰乾研末重羅極細凡服此藥每料二斤日將白米作粥候溫量投藥末和勻任意食之不可多嚼飢則再食日進數餐不可更食乾飯只以菜乾或筍乾少許過口一切油鹽醬醋葷醒酒果糖面雜物概行禁忌渴時不可吃茶用白滾水候溫投藥和勻飲之每日約服數錢以漸而進不可大多服藥旬日或作嘔或胸膈嘈逆或大便內下諸毒物此藥力盛行必須強服不可中止遠年痼疾盡料全愈患病未深只須半料鬚眉再生肌膚完好筋骨展舒平復如舊飲食不忌惟豬首鵝菌及濕毒之物終身忌食此方藥雖不常效應好神又澠水燕談有服長松之法二十四舉曰明都穆譚纂云陸某長洲農民也嘗染風疾鬚眉盡脫累藥無效自以為必死遂辭其家操小舟攜一孫自隨往來江湖間丐食為活嘗晚泊酒家求灑有白衣老人惻然憫之曰吾善治此病即以針刺其兩股血流如注命以河水沃之須臾血止復探囊中以紅藥一丸如小指大與之日服之至夜半當出大汗可急入水浴之問其姓曰姓鍾問其所居何地曰黃村某服其藥至夜半果然時暑天如其言入水浴之浴畢呼其孫曰吾疾去矣吾疾去矣驚喜不勝明日操舟還人亦大驚訝某具言其故往其地謝之則絕無所謂鍾先生者始知為鍾離仙云或言某嘗救一投水婦人亦陰德所致此清金忠淳硯云甲編中所收其事雖涉奇怪姑錄以廣異聞醫案相州青梅一民年三十餘左手小指麻木者期年所後兩腳𤸷痹時時如為針錐所刺里中醫久治無應效遂來東都請予診之予曰此癘風也渠面色不悅予曰此當急治方可不然則瘀血蔓延終為廢疾矣汝狐疑不能決我使汝知其為癘風乃延患者於室中令解帶裸體點火於樟腦以照其周身則死血隱匿者灼灼乎猶指蒼素也即以三稜針刺數處患者曾不覺痛癢於是始信予言勉強求治乃用當歸湯十五日次與第一神效散下之三日出種種惡物及蛔蟲五條次與第三神效散又三日下黃糜汁十餘碗次用竹精丸者二十日外以三稜針隔三日取瘀血其症十愈九尋以龍石湯兼用香果散三十日而全然隨愈彼來予庭厚謝告以歸鄉且請藥百餘貼將攜之還乃課與之復囑曰自今後三年當屏絕欲情清淡飲食遂歸鄉其後藥盡則遠致使以乞焉凡於本病處服藥者三百貼又能守禁忌五年後舉一子每歲致土物以謝活命之恩者八年於今云山城西岡村一富民從弟年二十五病癘疾五年眉須半落手足稍拳攣且面上手足發紫㾦癗數處既而兩腳頑痹不覺痛癢平安醫數輩醫之無一效遂廢藥登某山斷食褥於鬼神者七日疲勞殊甚族人扶載歸家病熱依然不衰荏苒甚矣安永戊戌歲余遊西京西京違西岡十數里傳聞余療奇疾乃以轎輿迓於客舍而求治余已至則患者向余慟哭曰我年未滿三旬不幸罹於天刑之病醫藥禱禳俱無少效幸以君之力再得為完人再造之恩死不忘也余就而視之合谷肉已脫爪根無白暈眼光如電然似所可喜者以手指不甚屈爾余曰既見惡症二三於法屬難治然未嘗浴溫泉且齡甚富更能守禁忌如法服藥當得愈焉古人有言自非醫者神手病者針心罕能免汝能如此邪渠拜手稽顙曰敬從教而已遂使患者居室中遍塞窗戶令黑暗秉燭看其周身則瘀血限界粲然分明乃盡墨記之以燒針刺之者三日初刺針入一寸余患者曾莫知痛癢第二日則針入七八分頗覺痛第三日針入未過三四分其痛不可任此乃以瘀血去而新血生也內用第一神效散三日大便下利日七八行次用第二神效散則後灰色蟲十四條長尺有奇內二條有紫黯色尤大者但作眼目處而無瞳子乃並放盆中以水灌之搖擺片時而死此自患者食中無名三指俱舒而能屈伸次與第三神效散則下如魚腸者升余面上手足針處黃水出腐肉欲已去其瘀血伏匿在於肌肉間者又見數處再刺燒針內用虎勢丸十五日針瘡膿汁出竭而新肉日長手指皆伸更用龍石湯四十餘日眉須漸生而方護全安薩州書生某年二十二負笈遊於東都昌平弘文院日夜諷誦才敏超邁頗賦詩屬文居之三年患下疳瘡服藥病瘥後周年許右手小指頑鈍不知痛癢手足生瘡如梅實大隨愈隨發又面上發赤斑如錦紋百藥雜投略不見效至右手指頗拳曲請予診之予曰不遽治則終至廢疾乃語治術之法則渠竊懼其燒針口順心違又請他醫服藥三閱月病勢日甚一日復來商治於予予乃眎之則以不治證候既已盡具固辭患者及同學者屢來求治予曰假令施治術亦惟僅不過免鼻柱崩倒手足墮落耳恐不可得為完人遂刺燒針與藥調理三月後針瘡皆愈面色不異好人惟惜右手指屈曲不舒自是其後渠常以左手把筆慣習煉熟久之至能作字矣然渠病愈後不以片言來謝於予之庭且不行纖毫之束脩特可謂不知禮者宜哉罹斯病患而狐疑猶豫以延引日月至盧扁退走之際才希望予術是實非渠不幸而天譴之使然也熊本藩一士某年四十餘右頰近鬢生瘡形如稍瓜頭平闊不起結痂如魚鱗黃水常出漸漸延及於滿面自春至夏尤熾爽氣來則乾燥每旦白皮盈掬正如雲母屑如此者四年醫用防風通聖散化毒丸其他解毒之丸散及膏藥熨藥等無算俱無少效友人某邀余視之余竊知為癩瘡然以人多隱諱不敢語患者乃謂曰是非黴瘡結毒之類所謂無名頑瘡根基沉深非尋常湯液所能治焉乃與當歸湯十餘日更制苦參丸日以五七錢白湯送下四十餘日而全愈永獲享康寧之福匫董鋪年三十八性嗜酒耽飲既多又好啖生魚肉積久漸肥因釀成齇鼻期年後復面上發紅斑漸如頑癬疥癩遂至眉毛脫落或以為惡疾或以為結毒更醫累百毫未無效病熱轉增於是商治於余余詳視其病態決非結毒惡疾所為也乃濕熱所致爾經曰火鬱則發之乃用升陽散火湯一月餘而方獲全瘥一典鋪兒年八歲頸項生瘡三五枚形如桃核大隨生隨褪年半後蔓延舉體既而皮膚剝落眉發半脫左手拘急飲食稍減更啞科十輩皆俱用解毒劑而病勢漠然轉加增劇訪治於余余曰是父母黴瘡毒氣所遺而今之證候正氣衰憊為殊急矣譬如良民久為寇賊擾亂宜先培其根本以攝其虛陽國富民寧而從事於斯乃二中湯見醫方會解即理中湯令小建中湯方倍人參用之三十日飲食漸進元氣恢復繼與清榮湯兼用集良丸每旦服五七丸至四十餘日而全然告瘳古云用藥如用兵者其斯之謂歟一男子年三十五患下疳瘡三年後兩腋下發瘡靡爛疼痛日夜流臭水久而不愈遂沿及身面漸至無完膚眉須盡脫落且新增筋骨疼痛易數醫不效邀余商之余曰此黴瘡毒氣在表裡之證乃用柞皮湯早晚吞飛龍丸間三日與鐵槌丸以下之如此月餘其痛稍減肉長瘡靨而愈數月後眉須復生當歸湯當歸芎藭芍藥荊芥各二錢上四味㕮咀以水五合煮取二合去滓分溫三服不拘時候竹精丸大楓子去殼炒百目雄黃苦參各一兩肥皂莢四兩片腦二兩硫黃一兩上六味為細末煉蜜丸彈子大分作二十裹以一裹空心三服宜二十日服盡第一神效散大黃白牽牛子芎藭各一錢巴豆五枚赤石脂二錢上五味為細末分作三裹以一裹臨臥向一更來白湯頓服第二神效散大黃一錢巴豆三枚去殼不去油丁子五分補還眉標一枚不去翅足本邦所產黃赤斑文者佳上四味為細末和勻第四日臨臥白湯頓服第三神效散蒲黃芒硝各四錢白牽牛子三錢麝香二分上四味為細末和勻分為三貼服法如前二方虎勢丸土茯苓二十錢大楓子去殼焙黑五十錢片腦四錢鹿頭燒存性六錢白花蛇酒浸焙乾烏蛇酒浸焙乾各八錢大黃六錢雷丸油八錢即大楓子油今從邦俗稱上七味為細末用雷丸油與前藥末和勻為丸若稀稠不得所乃宜滴麻油必不可用米糊如梧桐子大以一劑分作一十五貼以一貼日三夜二服空心臨臥龍石湯柴胡地黃黃芩龍骨人參半夏各一錢甘草生薑各五分大棗七枚上八味㕮咀以水八合煮取四合去滓分溫服不拘時候香果散露蜂房芎藭大黃各一兩甘草一錢上四味為細末每服一錢白飲送下苦參丸治大麻風毋論新久穿破潰爛老幼俱可服之苦參一斤大楓子肉六兩荊芥十二兩防風各六兩枸杞子威靈仙當歸大胡麻川芎蒺藜大皂角川牛膝牛蒡子獨活何首烏白附子全蠍各五兩白芷六兩風藤羌活連翹蔓荊子蒼朮天麻子杜仲草烏頭泡去皮尖甘草各三兩人參一兩砂仁二兩白花蛇二兩切片炙黃上藥共為細末醋打老米糊為丸梧桐子大每服三四十丸溫酒食前後任下避風忌口為妙一娼家主年二十七幼而學書於師家忽左手小指瘙癢不可忍自以齒齧之竟得齚而脫家人大驚急延瘍醫治之醫乃欲續之不能遂用傳藥或灸傷處然後獲血止而漸愈其後右足小指生瘡又兩足外廉頑痹時如被針錐刺又腕後生瘡數顆或出或沒久久不瘥於是始知為癩瘡更數醫不效經歷累歲形體漸羸瘦左手指拳曲爪根白暈滅足心生瘡潰鑿步履艱難已過十八年而請治於予予以屬不治證乃固辭患者及其兄弟勉強求治予曰我雖有神方藥頗駿恐不耐瞑眩反害焉患者扼腕而謂曰聞先生有奇術尚矣設使服藥至死又何憾焉況我罹此病患屢費財貨於醫藥釋家積乎禱禳者無算由是貲產蕩盡身體日屬委頓且不能與良人齒伍則生亦猶死也請先生以我試難治證亦可治耶否遂不可辭乃命門人森宗益施燒針乃與三種神效散尋用虎勢丸六日卒然肩背疼痛咽中閉塞完穀不下數日而死嗟乎予已識其不治證而壯其言而悲其志遂施藥反促命期今噬臍耳故詳書之為後來施治者龜鑑云頃觀崎陽吉雄氏某療癘疾其症蓋本書所論輕證者也其以三稜針刺赤斑用角以吸瘀血者與余之治法無異而惟至面上四末其他一身溪谷出沒凹凸難用角之處則必攫得水蛭數十條更傳少酒於赤斑之處或刺針出微血使其吮瘀血是法蓋蠻人之所傳云然是得效方丹溪心法等所載蜞針法爾余雖未試之於理為尤當矣今並其治方拈於此以備於參考震靈丸大楓子去殼天靈蓋各一百錢大黃黃蘗各五十錢荊芥爐甘石瓠瓜山櫻皮燒存性各一十二錢上八味細末糊丸彈丸大每服十五丸蝮蛇大黃湯送下日三凡服此丸十日而後間服白瑩水一日復服前方白瑩水方蔑慄孤立乙斯五釐治結毒減半必不可多用石蜜八錢井花水一百六十錢上和勻每服四錢日二服強人更加一錢是蠻人方附錄記浪華一處女事崎陽一商人姓某者每歲來浪華驛亭留連數十日更易諸貨而後歸頃歲復來寓其家偶童女數人來遊於此一人年未笄姿色殊眾商覿之嘆云嗚呼惜矣哉之子過數年則恐當發癘疾主人愕然曰君何以知之曰我視其色澤以知之曰然則君何法之治而可免後患耶曰我有奇術若能委信則可以施焉主人乃以商之言語女父母父母聞之始則大驚中則大怒後則悲哀遂議治於商商乃先令求大內鬥許瓷瓶又煎成人參數兩而後使女側臥取鐵針一條長尺有餘者於兩腳湧泉穴刺之針入尺許女不堪痛苦氣將絕乃與前人參湯以手自臀腿邊推拊下則黑血迸出如湧因承之瓶幾五六升乃覆蓋密封以瀝青固濟更堀地理之訖云至來年期月則當發見之予來亦將在其時遂告別而歸而女針痏亦尋痊肌體悅澤勝於向日親戚莫不盡悅焉及期商來視其女云善哉病基既已脫矣乃使人出客歲所埋瓶發開睹之則其血盈溢於瓶口商云此血在人身中如是蔓延不致身體壞敗者幾希觀者大為異嘆云商乃謂女父母云我有一子年已成長未有伉儷願以此女獲配於彼何幸過之父母答云幸以君之靈得救一女於塗炭則一日生命皆是君之賜也敢不諾哉遂行納幣禮以送之云片倉子云奇矣哉商之得斯術也昔張仲景見侍中王仲宣謂曰君有病四十當眉落眉落半年而死令服五石湯可免仲宣嫌其言忤受湯勿服後果眉落遂至死今女父母能恪信商言女亦能耐忍痛楚而從於治法是以得免其大患嗚呼可謂勝仲宣遠也余亦竊疑夫瘀血者生血所化凡人身中若釀成一滴瘀血則累月積年漸滋蔓耳今收之瓶中綿歷期月相倍蓰云者於理為迂然而事物之變有不可窮者姑記以正於明哲云爾答友人書曏者以僕所編青囊瑣探黴癘新書二書備於電矚且謂日以新書既脫稿將上梓以公於天下矣茲辱手札伏而讀之謙乎其辭相推之有甚也屬乎其言閔憐之有加也而足下言以新書所載癘風論治固古來未有聞之奇術吾無間然矣然此病多於田野與鄙賤而至如都人士患之者甚鮮矣又且此證夫人殊所避忌者若此書一出則四方之傳聞者必來請治於足下然則恐以足下為治此等疾專門者而上則王公不召下則富豪不請耳是豈著書反名與利俱失者非邪如瑣探所載都下日常多有之病而至辨別傷寒之生死洞明婦人之產乳救療小兒之撮口及癲疾等則殊究確說妙論又且往往發古人所未言及則盍刻之前以後新書其刻之前也貴戚權豪農工商賈必相爭請招焉然則將獲名與利兩完於此嗟乎僕固雖貧賤以天祿幸裘褐疏食之資足以給體腹則亦豈敢自愛名與利而貪婪之為哉古有言人得異書私為帳中秘不示人非真好者真好者如好飲然獨飲不適也余續之云業醫得奇方獨為蘭室秘不傳人者非真醫者真醫者猶輔相之理天下然非化及蠻夷不為適也子不聞乎昔周公之輔相也其急於見賢也方一食三吐其哺方一沐三握其發其見賢如是急者何也是蓋為使天下人民各安其所各樂其樂矣夫醫雖小道古先王建疾醫職而司民災沴札差是以稱為司命之任也故雖生數千載之下事此技者豈不視民疾患猶輔相之視理亂成敗哉其舉賢良者為安民也著醫方者為蠲疾苦也今夫有難治之病而有奏效之神藥則設使希于都下與貴人而多乎山野與鄙賤何不博傳以濟眾耶僕雖譾劣頗見聖賢用心立志之分曷為欲名與利而束已成之書於高閣候未全書之備而先乎此後乎彼耶夫觀周公之三吐哺三握髮禹之過家門不入矻矻於濟天下則醫之視疾疢不亦孜孜於此乎是僕之所以先新書後瑣探也足下其亮鑑不備黴瘡論黴瘡之病考華人所論昉自嶺南卑濕地而蔓延四方如本邦亦起從肥前州而播布通國云蓋此病稀於古時而盛於後世故其治法亦粗於前而審於後然而稱呼百出濫名頗多或隨形狀之近似者而名焉或取始所起地而命焉或因其所發之處而稱焉或依字音假借會意以擴其名呼矣如其曰黴瘡曰梅瘡曰賣瘡曰㾦子曰楊梅瘡曰楊黴瘡曰楊梅毒瘡曰楊梅風曰楊梅疳曰綿花瘡曰砂仁瘡曰茱萸瘡曰果子瘡曰天泡瘡曰天疱瘡曰濕陰瘡曰妒精瘡曰陰蝕瘡曰廣瘡曰廣東瘡曰廣痘曰廣豆曰恥瘡曰臊疳曰濕毒曰濕氣曰陰疳曰陰頭癰曰陰頭瘡曰蠟燭發曰下疳曰便毒曰魚口曰魚口瘡曰橫痃曰橫眼曰𤵄痃曰蛀梗曰蛀疳瘡曰蛀幹疳瘡曰捲心蛀疳瘡曰獨腳楊梅瘡曰時瘡曰血疝曰血疳曰外疝曰結毒曰氣毒曰𤷍疒當曰下𤷍疒當曰路岐曰魯氣曰𤻼𤷍曰露𤷍曰馬𡘆馬癰曰騎馬癰曰騙馬墜之類不暇枚舉殆誣惑後人之耳目也以余觀之唯黴瘡下疳便毒結毒之四名以蔽之矣而此病近世尤盛而貴賤男女罹之者十居其半是誠和華一轍蓋承平二百年之久人人樂安佚內則膏粱膩味常充口腹遂生濕熱瘀血外則沉匿柳巷花街以動盪淫火一釀成此病遂傳之娼妓男娼則娼妓男娼之傳諸人也不知其幾千百或傳之妻妾或遺之孫甥而其病之將發也始則或起自誤擦破若被陰毛纏傷或自膿淋或自痔疾或久曠房室思動色欲敗精濁血流滯莖內或又疥瘡發周身遂波及前陰漸致淫浸當此之時若隱羞不示於人或忽藥餌而用速愈摻藥等則遂成便毒下疳之證或瘡發周身形如楊梅或如砂仁若夫至其毒之尤深則為筋骨疼痛或頭痛如破或潰蝕前陰腐爛後竅或穿咽喉或鑿頭面或墊崩鼻梁若一誤治法侵禁忌則至使父母遺體永為不具器可不懼哉若至其證之變態則齒齦膿潰幾類牙疳或舌心痛或破裂或舌傍潰缺常涎液漏脫或耳內如鐘聲或如風雨聲或如鳥雀之啾啾又如川流之湍湍或胸腹肋脅膕䯒臀腿及前後二竅常為痛或為發瘻作巖穴或為瘰癧為偏枯為痿躄或咳嗽吐痰如肺癰之狀或口鼻惡臭穢氣撲人鼻或鼻中出穢汁濃涕如鼻淵腦漏又出黃赤干涕或頭面生磊塊數個日夜疼痛經久不破或又發潰出膿汁積年累月不收口或眼內疼痛生紅縷或目如注朱或唇吻生紫黑贅瘤久而潰穿黃汁出而不止遂至缺蝕或為腹痛為水腫為勞瘵為囊癰為痔漏或手腳拳攣不能伸舒或眉發頹落幾如癩疾證狀百端雖不可窮盡其為結毒也一也宜辨認病人之強弱菀毒之淺深及表裡上下虛實寒熱以施治法矣又有襯眠呢黴瘡腐爛之人受自穢臭氣於口鼻直浸透裡面遂作之根基者此證多不發梅瘡便毒而卒然為咽喉腐爛為潰鑿或眼目見紅花或羞明以漸昏蒙或為筋骨疼痛其始以無患疳瘡便毒等必不可謂非黴瘡譬諸傷寒猶患直中少陰病亦宜直隨結毒之治法施藥也若夫耳聾目暗或形體柴瘠而手腳拳曲或羸瘦骨立而關節疼痛或漸漸飲食廢或大便下利者及因受父母遺毒有幼少發瘡瘍或臍中常濕潤時出穢臭膿涕或患膿淋痔疾者若以尋常胎毒食癖治之則積年之後多成漏瘡喜發於項腋及陰僻肛門之間後來必變見喉穿鼻崩或寒熱咳嗽等之諸證多藥餌不驗連綿涉年而終致不起也治法初起小便澀痛或淋漓或陰中瘙癢或流敗精濁膿或小便為二道為亂散或馬口麋爛或龜頭後包裹之皮腫如水泡者並龍膽瀉肝湯加土茯苓五錢或加味解毒劑若生於兩胯合縫間者謂之便毒其始鼠鼷核起如瘡建而漸漸大結腫焮痛為寒熱者紅花散瘀湯清榮湯或六味解毒湯俱加鯪甲牛蒡子之類若服之不起脹色不變尚堅硬不潰者宜令患者強屢步履兼以家方面粉散頻頻熨腫上或又行後頃用元青法亦可其既潰者猶守用前方倍鯪甲或加黃耆二三錢外宜以白璧蒼玉煦育三膏各等分和勻攤軟棉上以貼患處後疳瘡亦用此法若身體發楊梅及砂仁瘡等加味消疳敗毒散荊防排毒劑消風敗毒散等俱加土茯苓二三錢而此證間有兼見筋骨疼痛者此是與結毒疼痛自異發表則愈若皮膚麋爛者柞皮湯兼用家方熨藥若連年積月不痊者亦宜從結毒治法以施藥凡黴瘡愈後若瘢痕紅黑不滅者用大黃白礬等分同研擦患處其痕即去若龜頭生瘡或馬口潰蝕或龜頭後凹處生瘡潰爛或成窠臼者謂之疳瘡虛者大劑雙和湯十全散二中湯之類俱加酒炒鹿角銀花土茯苓各二三錢若陽氣大虛血液枯涸者去銀花土茯苓倍參耆鹿角更加蝮蛇一二錢或取雄雞一隻不滿三年者去毛腸切肉炙啖日八九片正氣旺焉而後兼擇用加減五寶散集良丸實者奇驗湯加味解毒劑搜風解毒湯或龍膽瀉肝湯兼用飛龍丸銕槌丸若荏苒侵蝕不可遏止者以乳香湯董洗甚者鍜石湯大妙神驗若筋骨疼痛或鼻柱隱隱痛或時出干𫈨瘡痂黃膿或但鼻腫而其色紫赤或身體發㾦癗或為發潰等證必不可緩治宜遽令斷鹽味以大劑奇良甘草湯送下集良丸一二錢或白瑩水或搜風解毒湯加川芎大黃若虛者用六度煎下加減五寶散若咽喉潰爛或成窠臼常出稠痰臭涎或妨礙食飲者後世名之喉癬薔薇遺糧湯喉癬湯之類兼用獨味牛黃研細者每服送下二三分或結毒紫金丹若頭痛如破積久不差者宜用醫方筆記頭風一方兼以集良丸或以三稜針刺懸顱懸釐絲竹空瞳子髎等而出血或用角法以吮瘀血為良或又隨證取風池風府若頭面發疙瘩時痛時止歷載經月不差者亦以三稜針刺其腫上或以粗布裹手指浸醋擦破腫上乃以元青二三個研末醋和勻浸綿以傳之經一宿則必為水泡泡潰水出而後愈是尤神驗若眼目疼痛或生血絲或生翳膜者防風通聖散加土茯苓或四物湯照黃連解毒湯主之兼以家方明目膏頻頻塗眼胞內極妙若夫結毒咳嗽如肺癰之狀者栝蔞湯若手足不遂筋骨疼痛或毒結於手腕臂肘肩背腋下膝膕臀腿足趺等之處而朝朝暮暮痛楚殊甚或形如痛風歷節之狀或頭上顏額生磊塊來發潰者或山根腫痛或鼻梁陷墊及積年發漏其他結毒之證二三並見前頃諸藥不應者宜用七寶散虛甚者宜以參耆鹿茸熟附子濃煮汁送下實者加味化毒丹白瑩水白蛇丸及湯主之凡用配輕粉諸方病愈之後若飲食不進或步履無力不了了者宜用兩輪散應效如桴鼓若夫血液耗亡肌膚不悅澤者六味地黃丸十補圓七寶美髯丹等久服可以培其根本也龍膽瀉肝湯正宗治肝經濕熱玉莖患瘡或便毒懸癰小便赤澀或久潰爛不愈龍膽連翹地黃澤瀉各一錢木通車前子歸尾山梔甘草黃連黃芩各五分大黃二錢便秘加水二鍾煎八分前按止方本方去柴胡加芩連大黃梔子連翹甘草又薛氏加減方本方去柴胡加黃芩梔子甘草加味解毒湯家方土茯苓薔薇根各五錢金銀花芎藭木通大黃各二錢木瓜五加皮甘草各一錢上九味以水一升煮取五合去滓溫服不拘時候紅花散瘀湯正宗治入房忍精強因不泄以致瘀精濁血凝結兩胯或小腹之傍結成腫痛小便澀滯者當歸紅花蘇木姜蠶連翹貝母乳香皂角針石決明穿山甲各一錢大黃三錢牽牛子二錢水酒各一碗煎八分空心服行五六次方吃稀粥補之清榮湯家方治楊黴疳瘡當歸川芎芍藥地黃何首烏蒺藜子黃蘗各一錢土茯苓五錢上八味以水七合煮取三合溫服六味解毒湯忍冬土茯苓木通上川芎大黃中甘草下上以水五合煮取二合半分溫三服麵粉散家方治便毒不起脹及不發潰者麵粉白芥子研各八錢上二味絹袋盛浸滾湯頻頻熨患處神效白璧膏紅毛稱干膚刺此膏非但治下疳便毒又能傅一切潰瘍解熱止痛痔疾痛甚者尤神驗白蠟牛脂野豬脂家豬脂椰子油各二十錢粉錫三十錢麻油一合上先以麻油入潔淨鍋內慢火熬至八分下黃蠟將柳木篦攪片時更挑少許滴入水中試軟硬得中乃住火頃之用細舊絹濾淨卻上火看似瘩化之象而入四種油脂攪和乃下鍋來猶攪候溫冷交以白堊徐徐投入膏內不住手攪之看漸漸膏凝其色如白璧而後納貯瓷器聽用一方去椰子油加片腦十錢蒼玉膏紅毛稱遏僕斯治諸腫瘍能吮膿去毒乾溼潤黃蠟牛脂野豬脂椰子油銅綠各二十錢麻油一合上修煉之法同前法而以銅綠最後下煦育膏紅毛稱跋日慄治癰疽發背諸般惡瘡潰爛者貼之則腐肉易脫新肉即生瀝青五十目細研宜用紅毛產黃蠟二十錢牛脂十錢麻油五十錢即准一合二勺五撮上先煮麻油片時許更下黃蠟牛脂令溶化乃入瀝青末攪轉離火用細舊絹濾淨納瓷器上三種膏藥並休達方天明甲辰冬予講產科術於靜儉堂彼感予精密於產蓐之技日夜研究數往還語次偶洎瘡瘍之事彼遂發其秘蘊傳之其後予屢試有效驗井云此方吾家所秘勿妄傳人予隘之今刊刻普傳凡醫家雖非外科專門者常制可以施於人以上三膏並攤紙花中外緣以萬應膏貼之患處乃不脫落萬應膏治諸瘡鉛丹九十六錢黃蠟十六錢麻油百六十目即准四合上先煮麻油次下黃蠟更入鉛丹攪轉一晬時鉛丹變黑色軟硬得中為度加味消疳敗毒散防風獨活連翹荊芥蒼朮下知母黃蘗茯苓木通上澤瀉車前子牽牛子大黃中上十三味水煎溫服荊防排毒劑荊芥防風茯苓獨活上桔梗川芎中甘草下枳實生薑中柴胡中上以水四合煮取二合分溫三服消風敗毒散當歸川芎赤芍地黃升麻乾葛黃芩各一錢黃連黃蘗連翹防風各八分銀花甘草各五分蟬蛻二個上十四味水煎服柞皮湯柞木皮俗稱孤奴及訥葛窊土茯苓各三錢銀花荊芥地黃芍藥防風各二錢牛膝木瓜黃蘗各一錢上十味㕮咀以水五合煮取二合半去滓溫服先考苔翁先生秘方治楊梅疳瘡糜爛薰洗方食鹽五勺荊芥忍冬各二兩敗荷葉五葉青木葉廿片華名未詳俗稱遏屋吉訥發上粗銼以水一升煮至八分屢薰洗患處雙和湯補血益氣治虛勞少力芍藥七兩半黃耆密炙當歸熟地芎藭各三分甘草炙肉桂各二兩二錢半上為細末每二錢水一盞半姜三片棗一枚煎六分食前服十全散治諸虛不足久病虛損面色痿黃腳膝無力人參白朮茯苓甘草炙黃耆當歸芎藭熟地芍藥肉桂各等分上每二大錢水一盞姜三片棗二個煎七分濕服此藥補虛損大有神效二中湯醫方會解即理中湯小建中湯兩合方加減五寶散治結毒筋骨疼痛腐爛口鼻諸藥不效者滴乳石如乳頭下垂敲破易碎亮似蜻蜓翅者方真四錢琥珀硃砂各二錢龍腦一錢珍珠四錢勢州所產為上品水府產次之然直殊貴非有力者難得之故今倍加分兩而換用俗稱遏薩慄辰珠者亦有效驗上各研極細共為一處再研數轉磁罐密收病在上部者用藥末一錢加飛羅面五分病在下部者加八分再研和勻每用土茯苓五十錢水一升煎至五合濾清作五次分加五寶散一日服盡完十二日自愈若不愈者更作一劑如鼻子腐爛者土茯苓內加辛荑三錢煎服忌海腥煎妙滷鹽房事等件此余家所秘加減法應效如桴鼓集良丸治結毒不問年深日近筋骨疼痛或頭痛如破或鼻柱崩塌陽物潰蝕等證平遺民方天靈蓋八錢輕粉二錢半牛膝二錢孩兒茶二錢五分一半為衣鷓胡菜栝蔞根各一錢四分天南星二錢二分大黃四錢鼴鼠燒存性四分上九味為細末打糊丸梧桐子大每晨一錢加昧解毒湯煮汁送下凡用此藥先用解毒湯三日次與此丸尋於解毒方中倍大黃應效如神奇驗煎治一切黴瘡神效熟地杜仲炒人參黃芩黃連炒大黃酒炒檳榔黃耆酒炒木香各二分甘草生三分土茯苓十錢上十一味以水五合煮取二合半再以滓入水三合煮取一合半和前煎汁一日服盡忌茶蔥萊蔔海腥搜風解毒湯治黴瘡結毒筋骨疼痛不能步履或壞肌傷骨及下疳瘡土茯苓十錢防風木瓜木通薏苡白蘚皮金銀花各五分皂子四分上水煎空心日三服飛龍丸治黴瘡下疳玉莖腐爛筋骨疼痛諸藥不能治者牙茶上好者三錢五分大黃一錢八分輕粉八分上二味極細末先取粳米飯鴨蛋大摻輕粉攪和作摶飯炙於炭火上反復候焦黃離火更捏令相得再炙如此大都三四遍乘熱研如餅入余藥和勻若稀稠不得所更加粳米飯丸麻子大每肌二十五丸晨旦臨臥白湯送下用之三日次與鐵槌丸丁子大黃巴豆霜各等分李東壁云稱研爛以紙包壓去油者謂之巴豆霜周按今人以燒存性者為霜非也蓋以百草霜誤爾上三味細末米糊丸麻子大每服十二丸間三日旦暮白湯送下若病重者漸加至二十丸又宜間四五日用之以上二方並先考苔翁先生所秘乳香湯治下疳瘡漸漸侵蝕不可止遏者乳香一錢沒藥六分樟腦二錢蘆薈一錢上四味以燒酒二合煮取一合半頻頻湔患處鍜石湯治用前方不效者此方諸潰癰用膏反侵蝕者神驗石灰三十錢以滾湯一升攪勻去滓不用焰硝四錢膽礬三分上二味投入石灰汁中溫頻湔患處若為水泡者去膽礬加礬石一錢奇良甘草湯土茯苓三十錢甘草一錢上以水一升煮取五合再入水一升二合煮取三合半前煎汁和勻一日服盡不可別用湯水茶酒又切忌海腥炙煿滷鹽房事等件六度煎治黴瘡筋骨疼痛諸藥不效形體虛憊者當歸芍藥附子黃耆虎脛骨各一錢土茯苓八錢上六味以水一升煮取六合去滓再以水六合煮取四合又以水四合煮取二合去滓以三煮汁合和溫服不拘時候喉癬湯治咽喉漸漸腐去飲食用粉面之爛者必仰口而咽每咽泣數行下甘草桔梗各二錢山豆根龍膽射干各一錢土茯苓五錢上六味以水五合煮取二合分溫三服每服送下牛黃二分薔薇遺糧湯治結毒咽喉破鑿者土茯苓七錢薔薇根五錢桔梗二錢五加皮一錢上以水六合煮取三合溫服不拘時候結毒紫金丹治遠年近日楊梅結毒筋骨疼痛日久腐爛臭敗不堪聞者或咽喉唇鼻破壞諸藥不效者妙龜板放炭火上炙焦用新安酒漿濃筆醮漿塗上反復炙塗三次以焦黃為度二十錢石決明用九孔大者煆紅童便內漬之一次辰砂明亮者各末六錢共再碾極細爛米飯為丸麻子大每服一錢量病上下食前後筋骨疼痛酒下腐爛者土茯苓湯下至重者四十日而愈此功力勝於五寶散元周嘗屢試此方所患在咽喉者殊覺有驗醫方筆記一方土茯苓四十錢忍冬三錢防風天麻玄參辛荑芎藭各六分黑大豆四十九粒芽茶一撮上以水五碗煎取三碗分溫服防風通聖散宣明論川芎防風當歸白芍連翹薄荷麻黃各四分石膏桔梗黃芩各八分白朮梔子荊芥各五分滑石二錢四分芒硝四分大黃四分甘草一錢上生薑水煎溫服四物湯局方當歸酒炒芎藭芍藥地黃各等分上每三錢水一盞半煎八分熱服食前黃連解毒湯肘後黃連三兩黃芩黃蘗各二兩梔子十四枚水六升煎取二升分再服家方明目膏見於青囊瑣探栝蔞湯治結毒咳嗽似虛勞者栝蔞根牡蠣甘草各一錢連翹羌活各二錢反鼻八分上以水五合煮取二合半分溫三服七寶散黴瘡結毒一切難名狀之病或累月積年潰爛不收口或筋骨疼痛手足不遂或周身發疙瘩或咽喉糜爛或穿孔或山根腫痛或鼻梁陷墊及久年痔漏其他頑瘡惡毒瘡皆治之其效如神不可悉述土茯苓炒二十錢人參炒四錢用俗稱薩摩小人參者鹿角截段於土器中炭火燒酒浸一日夜再燒過四錢黃雌雞一隻去毛腸及肉取翅骨燒存性以其肉切作四十二片方服藥時先吃一片上為細末分作四十二貼每服一貼奇良甘草湯送下日宜服六貼完七日見自愈兆若不瘥再作一劑若方春夏溫熱時雞肉難收則去毛腸完燒存性用亦可加味化毒丹牛黃四分琥珀五分血竭製大黃雄黃硃砂乳香木香白蘚皮川山甲各一錢五分蟬蛻二錢生生乳一錢沒藥一錢七分貝母三錢丁香牙皂各五分鬱金一錢殭蠶四錢上各製為末用神麯末六錢打稠糊入藥搗勻丸梧桐子大別研硃砂為衣每早空心服十五丸每晚空腹服十丸砂糖湯送下炒米湯亦可病去藥減如餘毒未盡藥不可徹百日內勿使大勞大怒茶酒止可用十分之三凡服此丸先用滾湯汨咽清胸中濁氣嗣服丸藥藥後啖糕果之類厭丸藥下胃曰宜尊法毋忽是牛黃化毒乙字化毒兩合之方雖藥繁雜取效尤捷余屢用屢驗者也嘗按陳司成立牛黃化毒其佗十干諸丸之方意是本必一方蓋為奇其術一二增損以廣之者而已何必別六經見證可以配十方乎白蛇丸治楊梅結毒痼疾廢病烏梅一錢竹蠹蛀末三錢無則以淡竹末代之牙茶華產物一錢五分白蛇酒浸少炙二錢溲疏皮一錢五分烏貲及訥遏未葛窊當長夏時採之余月難得輕粉一錢紙包入摶飯內煨熟取出用上六味極細末米糊丸綠豆大每旦食前以一錢六分赤小豆煎汁送下凡用之七日內須忌禽獸魚鱉滷鹽茶酒唯以白粥將養之過五六日則當齒齦黑血自出完七日而後宜以淡味噌汁煮瓢畜蘿蔔冬瓜鰹脯鰈魚𬵵魚之類食啖之嗣以後方若口中糜爛者宜一味柞木皮煎煮以頻含漱口中白蛇湯當歸川芎芍藥甘草大黃白蛇酒浸少炙黃芩肉桂桂枝檳榔山椒丁子茯苓人參用俗稱薩摩小人參者青木香各等分上生薑二片水煎服一方加葳靈仙萍蓬根乳香沒藥用此湯七日後又用後方加味四物湯當歸川芎芍藥地黃甘草葳靈仙萆薢椒目各等分上生薑二片水煎溫服祛毒煎去輕粉毒車前子牙茶各上黃芩梔子連翹木通各中黃連黃蘗各下上八味水煎溫服凡用有輕粉諸藥疾患盡愈之後若飲食不進或步履無力淹然不復舊者宜用後方應效如神兩輪散櫻木皮華名未詳本邦稱葛跋薩孤刺訥葛窊蜀椒各六錢上二味細末每服一錢白湯送下日三服白瑩水見理癘新書六味地黃丸見小兒直訣嚴氏十補圓見濟生方七寶美髯丹見本草綱目何首烏附方以上諸方予嘗所親經驗有得師授者有得友人者又有深秘帳中而不妄傳人者予得數方甚難今不吝惜刊刻普傳大方雖然古人有言病之變狀不可一概言之所以醫方千卷猶未盡其理故又增附諸家驗方於後臨證之工宜擇焉地黃湯治楊梅瘡地黃上牙皂木瓜獨活當歸川芎大黃中黃芩黃連甘草土茯苓自十錢至十五錢上十一味以水八合煮取四合服若渴者以水一升煮取七合服凡楊梅結毒毒在上部而著咽喉牙齦頭面者宜用嗅藥法若毒著下部而手足筋骨疼痛或前後二竅疳蝕者加味芎黃散主之嗅藥法硃砂光明者一錢金箔一片沉香一錢百草霜上以前三味極細末次入百草霜和勻其色濃紫色為度分為七貼再以一貼藥末作三紙捻條子令患者口裡含冷水暖則更之點火於紙捻以嗅之日宜用一二條子完七日用盡加味芎黃散川芎大黃黃蘗良薑不可陳久各一錢輕粉二分上以前四味極細末分作七貼臨用入輕粉和勻日用一貼以土茯苓二十匁煮汁送下七日服盡若病重者用輕粉二錢稍輕者用一錢隨證不用亦得代五寶散治結毒筋骨疼痛田安亭方人參輕粉燒各五分巴豆霜一錢龍腦五釐辰砂一錢上五味極細末糊丸麻子大每服五丸土茯苓湯送下日三服三玄湯治𤻼𤷍其毒淺者防風當歸木瓜檳榔羌活白蘚皮大黃黃連各等分三玄即野薔薇苗土茯苓各倍用甘草少上水以五碗煮取三碗分溫服紫根牡蠣湯治楊梅瘡毒痼疾沉疴無名頑瘡及𥀬瘡嶮惡證神驗當歸芍藥川芎大黃升麻牡蠣黃耆紫草甘草忍冬上以水五合煮取二合半去滓三服虛者去大黃實者去黃耆牛蒡子湯治瘡毒攻咽喉腐爛疼痛飲食不下遠年日近並效惡實二錢玄參烏犀角升麻黃芩木通桔梗甘草各一錢土茯苓四錢上九味以水七合煮取三合分溫服治黴瘡骨節疼痛神效方大鼠一具阿仙藥紅花各一錢黃丹四錢糯米一合上五味俱燒存性研細每服一錢白湯送下日一又方赤小豆鼴鼠燒存性各五錢大黃輕粉土茯苓各三錢上五味為細末米糊丸梧桐子大每服二十粒以六味解毒湯送下二葛四黃散治結毒筋骨疼痛諸藥不能治者如神大黃三錢黃連黃芩當歸芍藥葛粉各二錢葛根黃蘗各一錢半輕粉煆甘草各五分上細末以土茯苓湯之類日服三四錢一方用二葛四黃歸芍各四錢輕粉一錢更加龍腦五分特神效煆輕粉法用土器盛輕粉不以多少生紙封口傅糊於紙緣黏著於土器口外使粉不飛乃上火則設水一器浸指於水中彈濺蓋紙上候水痕燥覆紙緊張而又彈濺焉凡如此五十遍離火安地上去火毒取出聽用用此煆煉之法則治效如神又且口中曾不糜爛可秘可秘黴瘡神效方鷓胡菜四錢巴豆二錢甘草五分上細末稀糊丸綠豆大赤石脂為衣分作七貼以溫酒日服一貼若羸人宜十四日服盡或以菝葜煎汁送下亦得若用菝葜則宜用巴豆四錢又嗅藥方麝香一分沉香四分龍腦一分光明朱四錢鉛丹四錢百草霜五分金箔銀箔各四片上八味為末每四分入紙捻條中長作五六寸令患者坐紙屋子中口裡含水點火於紙捻以齅之七日而止病人必下利若吐是其驗也若用此藥口中糜爛者宜平胃散加蜀椒皮大黃煎服若不勝藥氣者以白梅黑豆煎服凡用此藥者唯宜食大麥甘蔗之類忌其他一切物治楊黴結毒筋骨疼痛奇方四物湯黃連解毒湯各四錢大黃牡丹皮牛膝各一錢白丹二錢七分上為細末分為九貼日服三貼每服以後方煎汁送下作白丹法以鉛丹一斤樟腦三十匁和勻以酒煉作餅子置瓦上上火一炊時更點火於餅子煅之煙盡則又再煉煆之如前法凡如是三遍次不用樟腦唯灑煉又更煅如前法鉛丹變白色為度各等倍奇湯大黃杜仲當歸牛膝地黃白芷黃連檳榔芍藥川芎忍冬甘草木瓜沉香桑寄生各等分土茯苓倍用上十六味以水七合煮取三合半去滓溫服如神湯治一切瘡毒侵眼目生翳膜者神效黃芩黃連木通白芷丁子木香升麻茯苓防風連翹大黃枳殼沉香乳香薰陸地黃土茯苓白蘚皮各等分甘草少上水煎服若膿出者加獨活毛髮脫者加皂角子牙齒痛者加木瓜薏苡仁舌痛者加蟬脫人參白姜蠶梅肉丸諸惡瘡毒疳瘡其他無名頑瘡悉療之梅肉燒存性一錢半一方用一錢八分梔子同上一方用四分五釐巴豆七分一方用一分五釐輕粉同上一方用一錢五分上細末蜜和搗千下收磁罐先服三分三日後又服五分又三日後服七分取下惡物諸瘡乃愈蠲痹消毒散治時瘡肢節拘攣薑黃土茯苓獨活各五錢白朮當歸各一錢五分赤芍藥一錢白芷五分上水煎服解毒劑治便毒下疳疥癬穿山甲大黃黃芩反鼻燒存性忍冬甘草各中土茯苓大上八味水煎溫服有水氣小便不利者加茯苓反鼻散治楊梅瘡獨活連翹大黃土茯苓各四錢反鼻三錢川芎三錢上細末酒服一錢匕蟹取生淡水中甲大三四寸者可用生海潮中者不可用反鼻酒浸一宿各燒存性鹿角男子乳浸日曝乾三遍燒存性各十五錢沉香五錢上四味細末每服五分無灰溫酒送下日三按此方本出於伯耆州民間舊名黑龍散主治癰疽疔腫瘰癧乳癰下疳潰爛難愈及痔漏脫疽等證人人屢試有效驗故世稱之云伯耆妙藥而不呼其方名黑龍之名遂湮晦矣今人只呼曰伯州散蓋是其真方云而諸家所傳品味有增加者今駢附於後又方蝮蛇燒存性蟹燒存性鹿角燒存性皂角子燒存性大黃蛇床子俱忌火以上六味各二十錢沉香四錢半燒半生上七味細末每服一二錢溫酒送下一方有銀花又方蝮蛇一錢去頭尾燒蟹七分燒鹿茸三分燒牙皂三分燒沉香三分甘草二分上五味為末以一劑分二服溫酒送下取微醉為度禁生蔬茶酒酢面海腥冷水等件治黴瘡一方大黃犀角黃連黃芩牽牛子各二錢巴豆一錢上六味為細末米糊丸彈丸大每服三丸至五七丸疳瘡薰洗方忍冬上黃蘗中礬石小甘草小上四味水煎頻淋湔患處膩粉丸治結毒骨節疼痛牛膝焦黑色輕粉各二錢土茯苓一錢半丁子五分將軍八分上細末糊丸麻子大以一劑六日服盡至七日宜服後方一名前七寶丸用土茯苓一錢每服四分旦暮服之三日後服後方一錢云三物巴豆丸一名後七寶丸巴豆七枚丁子二分半大黃四分一作二錢上為細末糊丸麻子大每服十丸空心白湯送下治楊梅下疳結毒妙方竹下某方朱光明者輕粉竹皮各十五錢牙茶五釐一方用一錢上四味煉蜜丸麻子大每服五分旦暮服服十五日後宜用後方石榴皮湯石榴皮香附子各十錢甘草二分上三味以水一升煮取五合去滓溫服六物解毒湯治黴瘡骨節疼痛土茯苓四錢金銀花二錢川芎薏苡各一錢半木瓜一錢大黃一錢上六味水煎溫服化毒丸治黴瘡結毒佐井定策方白麵八錢大黃四錢雄黃二錢四分反鼻蜈蚣血竭各一錢六分乳香沒藥各一錢上八味為末煉蜜丸赤小豆大日服三四錢隨證加輕粉五分疳瘡敷藥方虎皮西洋參各一錢俱燒存性本邦稱廣東人參物輕粉少許上為極細末敷患處治楊梅毒瘡方醫學統旨輕粉一錢雄黃丹砂各二錢槐花炒龜版炙各一兩上為末糊丸梧子大每服一錢冷茶下日二服七日愈治楊梅瘡年久筋骨痛本草百病王治薔薇根木瓜五加皮茯苓當歸上水酒各半煎百效飲治楊梅下疳便毒神驗土茯苓百二十錢玄參銀花防風荊芥連翹黃蘗大黃芒硝蟬蛻天花粉龍膽豬苓澤瀉各二十錢甘草一錢二分上分作十二貼每一貼頭煎以水六盞煮取五盞第二次煎以水五盞煮取三盞第三次煎以水三盞煮取二盞俱相和一日服盡完十二日而後宜用後方蠲瘀煎茯苓芎藭黃蘗桔梗忍冬木通山梔子土茯苓大黃各等分上水煎溫服治楊梅瘡久不愈或浸淫者神效方銅綠膽礬各二錢上以蜂蜜一盞煎熬而後以苦薏花一撮裹於木棉布扎定其頭團欒如擘殼酸漿實狀乃以頭傅前藥炙火上乘熱熨於瘡上黃鼎元治楊梅結毒筋骨疼痛黃芩黃柏大黃當歸蝮蛇乳香沒藥犀角芍藥各等分上細末米糊如梧桐子大辰砂為衣每服二十丸白湯送下日二夜一改定化毒丹治結毒牛黃真者四分琥珀五分血竭雄黃硃砂虎脛骨鯪甲各一錢鍾乳二錢犀角烏蛇各一錢半龍腦三分麝香二分上十二味神麵糊丸梧子大每服十五丸砂糖湯送下虛者人參湯送下本方加熟大黃一錢輕粉五分名加味化毒丹橘尚賢方元周按牛黃化毒丹去乳香沒藥木香蟬蛻白蘚皮貝母生生乳加腦麝鍾乳烏蛇犀角輕粉方再造散治大風及黴毒不擇新痼服之可也鬱金五錢皂角刺一錢大黃十錢白醜反鼻各六錢上為末溫酒送下醫官山東洋方元周按即三因方通天再造散加反鼻方百中飲治下疳梅瘡其他一切濕毒積年不愈或頭面腐潰或鼻柱陷塌已成廢痼者神效津田玄仙方土茯苓上好物一百七十錢杜仲二錢八分甘草一錢八分黃連一錢四分檳榔人參本邦稱直根者牛膝大黃堅實者肉桂黃芩沉香上好品川芎各一錢上一劑分作七貼七日用盡煎法以水三合半煮取二合再以水三合煮取二合又以水四合煮取二合俱合和空心溫服治廣瘡爛壞鼻梁及淫蝕陽物出於本草匯言鐘乳石無問厚薄但明淨光澤者即堪入藥惟黃赤者不用蛀竹屑八錢乳香沒藥瓦上焙出油象牙各五錢枯礬三錢上為細末用白蠟四錢總和勻每早晚各服二錢土茯苓煎湯調下元周按此方平和之劑虛人宜用楊梅瘡無論新久不廿劑收功不獨永除後患更且無礙生育當歸五錢銀花防風荊芥各三錢何首烏肥皂子九個豬胰一副土茯苓四兩用水六碗煎三碗空心溫服忌鹽醬醋茶雞魚鵝鴨蝦蛋鮮物出於原體廣類黴癘新書跋道無古今而謂有古今者非古也乎相州倉君深甫者豪傑之士也達觀古今以立一家言名曰黴癘新書然本不厚則不能以耐久源不深則不能以致遠必也雖遠不泥雖久不廢言立術行此之謂不朽矣如倉君者近之耶吾醫矣哉今應肥州佐野先生之請謂予所言者以塞其責云也耳享和三年歲次癸亥桂月中澣書於崎陽客館柏塘程霞生
