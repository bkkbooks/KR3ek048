front:
  text: 序疾疢之至惡而最難理者莫癘若焉宜乎其有惡癘之稱而夫子自牖執其手而嘆也迨至近代設之坊構之院置之園不敢得與良民齒伍雖是出於不忍之政抑亦可哀哉相州片倉深甫蚤受業於家君與余少長鉥心刳精殆二十年矣以其涵養之久決生於分寸起死乎刀圭者日月陸續矣而最巧乎胎產之科坐婆斷以不娩者深甫至而拊摩一再得乳於蹲循揮霍之間者不暇僂指而深甫不自多居恆特憂癘之難療適有一老醫妙療此疾蓋其為法毒藥以下蛔蠍燔針以去血亏蔑內外攻之必至為完人而止真絕世之神方也深甫乃重齋懇請漸得授之洎西遊城攝勢紀之間試諸其病無不響應因謂病之最難理者莫癘若焉葉之奏奇效亦莫此方若焉夫有至惡之疾而有至當之方與獨秘以濟人不若廣傳之濟眾也遂筆而聯編槧而布世昔者錢子飛有治大風方極驗常以施人一日夢人自雲天使己以此病人君違天怒若施不已君當得此病藥不能愈子飛懼遂不施內翰蘇公志其事曰若余書不然苟病者得愈願代受其苦此可以為仁人之言也今深甫可謂不懼子飛之所懼能心蘇公之心善繄此書盛行與伯牛同患而免斯疾之嘆者必多有焉如黴瘡諸方悉出其日常從歷試經驗世之同技者若能確信於心而用之亦庶乎減掶中之記也天明七年歲在戊申夏五之初東都醫官丹波元簡撰黴癘新書序蓋夫上古聖人所制之禮乃后王之規則也廢古之法而新制之禮君子弗由也仲尼曰信而好古然古今異制時世殊宜故夏殷周互損益之矣其後以陽侯殺蓼候而竊其夫人於是乎大饗廢夫人之禮然則先王之制不宜則廢末世之事善則著之未始有常也故聖人制禮樂而不制於禮樂矣夫醫經經方古昔賢聖定之規矩立之準繩使末世之人百病一見而瞭然辨析故醫之理疾疢棄古之法立方齊於今學者弗取也然至於軒岐不論仲景不言元方不敘之病則又將何以稽考乎若夫論因之詳敘證之審而其立方處劑古昔之法不宜於用而後世之方善於理則釋古而行今又何為拂焉夫黴瘡之為病靈素靡載金匱農經病源等陰蝕陰瘡雖稍近似焉今之稱謂肇起元初而盛於後世於是乎前輩建之法論載之理方然而或過諸鑿或失諸粗其畏劇藥者則惟平易是務視硝黃膩粉猶蛇蠍排補劑者惟攻伐是用視參耆鹿角猶鈍刀互相倚頗矣不亦過乎是以予博集各家秘蘊取以親歷試殆且二十年其形雖壯實脈候涉虛則純補不厭其體雖勞羸診候得實則駃藥何懼然後其功效出人意表因鳩撮此等之法方乃成一袠名曰黴癘新書有廢古之法而創立規則者又有賴古之法而增新意者予豈敢不信古哉法方未始有常也夫聖人制法方而不制於法方矣新書之意蓋有似焉天明七年丁未歲臘月鶴陵片倉元周書於靜儉堂黴癘新書序甚矣哉癘風之難醫也自岐黃論因元方敘證思邈立方至宋元明名賢其方愈出愈繁未嘗見奏萬全效者矣余家業醫者三世每觀家君療此病不過十瘳其一二而已余自少小究心於方術博取而精研深思而透悟歷二十年之久而渙然冰解然後至治傷寒雜病滯下小兒自以為似有得焉然而竊憂此病之最難治是以更檢尋先哲之方法傍需俗間流傳之妙方者又數年既得百有餘方每得一方即取自試之或傳同志者以試之斷乎有功驗者幾希徒束手待盡竟歸之於命而已然私心常悲之思之不輟偶聞一醫生某獲治之之奇方於羽之隱醫彼比諸連城不敢許傳人於是余屢贈金帛卒購得其方其術甚神奇使膏肓發疾收效於數旬之間蓋雖華扁之術不過此也余復取家君所經驗者參伍相昭殫精竭慮盡辨輕重淺深可治不可治與假而真者真而假者以發其蘊奧矣於是乎天下治此病之法莫有出此書之右者豈與薛氏機要之類可同日而語哉管子有言思之思之神將通之諒非虛語也天明丙年春余家罹災繼又得時病瀕於死至稍知人事自謂吾若為泉下人則此法亦俱湮晦於是探篋衍取向者所輯錄更加校讎又並所聞見之治驗法方及余所親療醫案若干以附於後不揣鄙陋鏤梓傳遠題曰黴癘新書天下之業醫者苟能反覆是書得其術則縱令治一患者其功德豈為鮮矣哉故不敢自秘開示韞匵以與世共之云天明六年歲次丙午冬十有一月南至相州鶴陵片倉元周題於靜儉堂
